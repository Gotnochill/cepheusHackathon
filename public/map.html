<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Disaster Reports - Bangalore</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <h2>Live Disaster Reports - Bangalore</h2>
    <div class="container">
        <div id="map"></div>
        <div id="report">

            <div class="panel-section">
                <h3>Fleet Status</h3>
                <div class="fleet-grid">
                    <div class="fleet-stat">
                        <span class="fleet-num" id="trucks-available">3</span>
                        <span class="fleet-label">Available</span>
                    </div>
                    <div class="fleet-stat">
                        <span class="fleet-num fleet-num--active" id="trucks-en-route">0</span>
                        <span class="fleet-label">En Route</span>
                    </div>
                    <div class="fleet-stat">
                        <span class="fleet-num fleet-num--total">3</span>
                        <span class="fleet-label">Total</span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>Zone Pressure</h3>
                <div id="locality-counters"></div>
            </div>

            <div class="panel-section">
                <h3>Incoming Reports</h3>
                <div id="report-list"></div>
            </div>

        </div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="src/AnimatedMarker.js"></script>
    <script src="map.js"></script>
</body>
</html>
