<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Crisis Reports — Atria IT Area</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>
    <h2>Live Crisis Reports — Atria IT Area</h2>
    <div class="container">
        <div id="map"></div>
        <div id="report">

            <div class="panel-section">
                <h3>Fleet Status</h3>
                <div class="fleet-grid">
                    <div class="fleet-stat">
                        <span class="fleet-num" id="trucks-available">3</span>
                        <span class="fleet-label">Available</span>
                    </div>
                    <div class="fleet-stat">
                        <span class="fleet-num fleet-num--active" id="trucks-en-route">0</span>
                        <span class="fleet-label">En Route</span>
                    </div>
                    <div class="fleet-stat">
                        <span class="fleet-num fleet-num--loading" id="trucks-loading">0</span>
                        <span class="fleet-label">Loading</span>
                    </div>
                </div>
                <div id="fleet-detail">
                    <div class="truck-row" id="truck-row-1">
                        <span class="truck-badge truck-badge--available">1</span>
                        <span class="truck-label">Available</span>
                    </div>
                    <div class="truck-row" id="truck-row-2">
                        <span class="truck-badge truck-badge--available">2</span>
                        <span class="truck-label">Available</span>
                    </div>
                    <div class="truck-row" id="truck-row-3">
                        <span class="truck-badge truck-badge--available">3</span>
                        <span class="truck-label">Available</span>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3>Zone Pressure</h3>
                <div id="locality-counters"></div>
            </div>

            <div class="panel-section">
                <h3>Incoming Reports</h3>
                <div id="report-list"></div>
            </div>

        </div>
    </div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="src/AnimatedMarker.js"></script>
    <script src="map.js"></script>
</body>
</html>
